body:
  text: 邑主韓永義維那魏元預香火李英雄邑子張子訓邑子郭子逵邑主高元仁維那魏紹香火孫子璨邑子李阿察邑子邊和穆齋主李伯典坐倪士康邑老劉遵和邑子田祖暉邑子袁伏恩齋主寶典坐趙仲略邑老張和仁邑子宋子暢邑子劉士鸞中正霍羅侯坐主鄧道隆邑老栢延暉邑子夏侯貴邑子楊進國中正殷子琴坐主翟多仁邑子夏侯和邑子范道仁迦毗羅神王像主王小貴供養像主夫人賀供養那羅延神王妙旨幽微非聖無以盡於源聖行之興非福智莊嚴豈能弘其道然今合邑諸人等宿殖明珠久歷諸佛故能異心同契仰慕遺蹤在於定光像前敬造七佛寶堪并二菩薩賢聖諸僧彌勒下生梵王帝釋舍利非壹其金容赫弈照曜三千華麗二相妙菀八十剋木圖泥像而非喻採壁模形焉是其譬睹之者淨信開明虔禮者三鄣殄息斯乃塵勞之中紹如來種籍此勝善仰願國祚永隆三寶增盛法界四生七世先靈存亡父母現在眷屬發菩提心彌勒下生恒為導首開化群迷廣修万行共集善根同證菩提之道刊銘頌曰法性如如非有非无體非分別妙用非虛八相成道似同凡夫生而非生滅而非滅神通隱顯摩王歸軼化導三千人天獨步改迷接聖慈悲覺寤示三空門令遊正路淨修波若四攝資助奮翼道品菩提永固天統三年歲次丁亥三月壬申朔十五日丙戊建比丘道最比丘法賢洛州都兼治中奉朝請皇甫士通洛陽郡中正姜範比丘曇暉比丘道標征東將軍洛州大中正平恩縣開國男皇甫迥比丘洪猛比丘洪湛冠軍將軍洛州金墉鎮前車騎府司馬趙思榮比丘慧蘭比丘道定邑子趙遵明比丘法建比丘明海邑子范敬賓景明寺法和比丘曇樂邑子樂季和
